<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Received — Claira Joy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital@0;1&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --wine:#6B1A2A;
    --midnight:#1A1210;
    --linen:#FBFAF8;
    --midnight-65: rgba(26,18,16,0.65);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--linen);
    color:var(--midnight);
    font-family:'Courier Prime', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px;
  }
  .box{max-width:480px;}
  h1{
    font-family:'Libre Baskerville', serif;
    font-weight:700;
    font-size:clamp(26px,5vw,36px);
    margin:0 0 18px;
  }
  p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:19px;
    line-height:1.6;
    color:var(--wine);
    margin:0 0 28px;
  }
  a{
    font-family:'Courier Prime', monospace;
    font-size:13px;
    letter-spacing:0.05em;
    color:var(--midnight-65);
    text-decoration:underline;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>Application received.</h1>
    <p>Thank you for applying, I'll be in touch soon! Expect a reply within 2–3 days.</p>
    <a href="https://maclairajoy.github.io/apply-for-coaching/">← Back to the application page</a>
  </div>
</body>
</html>
